name: Pull locales from PARANOIDAL

env:
  DOTNET_SYSTEM_GLOBALIZATION_INVARIANT: 1

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  update-locales-files:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/dotnet/sdk:10.0
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mark workspace as safe for git
        run: git config --global --add safe.directory '*'

      - name: Cache paranoidal-git
        uses: actions/cache@v4
        with:
          path: .nuke/temp/paranoidal-git
          key: update-locales-files

      - name: Extract localization to JSONs
        run: ./build.sh ExtractLocalizationToJsons

      - name: Commit and push if changed
        id: commit
        run: |
          git config --global user.email 'skproch@yandex.ru'
          git config --global user.name 'SKProCHs Bot'
          if git diff --quiet && git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git add .
            git commit -am 'Updated localization from Factorio Paranoidal mods'
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger pack-mod workflow
        if: steps.commit.outputs.changed == 'true'
        run: |
          curl -fsSL -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/pack-mod.yml/dispatches" \
            -d '{"ref":"${{ github.ref_name }}"}'
