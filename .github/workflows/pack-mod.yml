name: Pack mod with new translations

env:
  DOTNET_SYSTEM_GLOBALIZATION_INVARIANT: 1

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-and-pack-mod:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/dotnet/sdk:10.0
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mark workspace as safe for git
        run: git config --global --add safe.directory '*'

      - name: Update and pack mod
        run: ./build.sh UpdateAndPackMod

      - name: Commit and push if changed
        id: commit
        run: |
          git config --global user.email 'skproch@yandex.ru'
          git config --global user.name 'SKProCHs Bot'
          if git diff --quiet && git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git add .
            git commit -am 'Update ParanoidalLocale mod sources'
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Read mod version
        id: version
        if: steps.commit.outputs.changed == 'true'
        run: |
          version=$(grep '"version"' ParanoidalLocale/info.json | head -1 | sed -E 's/.*"version" *: *"([^"]+)".*/\1/')
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: steps.commit.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: ParanoidalLocale ${{ steps.version.outputs.version }}
          files: .nuke/temp/ParanoidalLocale_${{ steps.version.outputs.version }}.zip
          make_latest: true
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}
